---
site_name: safe-whale
site_url: https://safe-whale.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: Run Python command-line tools in hardened container images with a pipx-shaped workflow.
repo_url: https://github.com/matthewdeanmartin/safe_whale
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - CLI: usage/cli.md
      - pipx Compatibility: usage/pipx-compatibility.md
      - Host Runtimes: hosts.md
  - Prior Art: PRIOR_ART.md
  - Specification: specification.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
